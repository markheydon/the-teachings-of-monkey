name: Deploy Hugo site to Pages

on:
  # Build and validate on PRs to main, deploy on pushes to main, and allow manual runs.
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.152.2
      DART_SASS_VERSION: 1.93.3
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Hugo CLI
        run: |
          chmod +x scripts/install-hugo.sh scripts/install-dart-sass.sh
          scripts/install-hugo.sh "${HUGO_VERSION}"
      - name: Install Dart Sass
        run: scripts/install-dart-sass.sh "${DART_SASS_VERSION}"
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Validate canonical episode titles
        run: python3 scripts/validate_episode_titles.py
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  # Deployment job
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
